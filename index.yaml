##############################################################################
# SOLUTION LAUNCHPAD — MANIFEST INDEX
# Version: 1.0
# Maintainer: Victor Noé (L7 AFSE, AMER_ACC_CBS_AFDC)
#
# PURPOSE
# This file is the single source of truth for the Solution Launchpad skill.
# The skill fetches this file from GitHub to match SE discovery inputs against
# available solution templates and return a ranked artifact kit recommendation.
#
# HOW IT WORKS
# 1. SE runs the launchpad skill with natural language or structured variables
# 2. Skill maps inputs to tags from the vocabulary below
# 3. Skill scores templates by positive tag match count (weighted by dimension)
# 4. Anti-tags are evaluated: blocker=true disqualifies, blocker=false warns
# 5. Skill returns ranked templates + gap report for any unmatched or flagged inputs
#
# HOW TO ADD A TEMPLATE
# 1. Create a new directory under solution-launchpad/<slug>/
# 2. Add the required files (see schema.md for required file list)
# 3. Add an entry to the templates list below following the schema
# 4. Tag against the vocabulary sections below — do not invent new tags without
#    adding them to the vocabulary first
# 5. Run the parametrization test before setting validation_status: validated
##############################################################################

manifest_version: "1.0"
