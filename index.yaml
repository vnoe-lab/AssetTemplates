# ══════════════════════════════════════════════════════════════════════════════
# ANTI-TAG DEFINITIONS
# Global rules that apply across all templates unless a template overrides.
# Template-level anti_tags add to or override these for that template only.
# blocker: true  → Tier 3: disqualifies the template entirely
# blocker: false → Tier 2: generates a warning in the gap report, does not block
# ══════════════════════════════════════════════════════════════════════════════

global_anti_tags:

  - condition: no-data-cloud
    triggers_on_template_tag: "data-cloud"   # any template requiring data-cloud
    blocker: true
    message: >
      This template requires Data Cloud. Verify Data Cloud SKU with AE before
      scoping. If customer is in a buying motion for Data Cloud, generate the
      Prerequisites Gap Report and continue — do not abandon the pattern.

  - condition: no-data-cloud
    triggers_on_template_data_source: "dc-*"  # any dc- connector
    blocker: true
    message: >
      This template uses one or more Data Cloud connectors. Data Cloud must be
      provisioned. Verify SKU with AE.

  - condition: declarative-only
    triggers_on_template_tag: "apex-available"
    blocker: true
    message: >
      This template was built with Apex components. Customer constraint is
      declarative-only. Apex components must be replaced or removed before
      this pattern is deployable.

  - condition: no-external-callout
    triggers_on_template_data_source: "dc-mulesoft"
    blocker: true
    message: >
      This template uses MuleSoft for external data integration. Customer
      org does not allow external callouts. Pattern requires modification.

  - condition: no-external-callout
    triggers_on_template_data_source: "dc-http-streaming"
    blocker: true
    message: >
      This template uses HTTP Streaming connector. Customer org does not
      allow external callouts. Pattern requires modification.

  - condition: hipaa-required
    triggers_on_template_tag: "hipaa-validated"
    blocker: false
    missing: true   # fires when template does NOT have the tag
    message: >
      Customer requires HIPAA-compliant architecture. This template has not
      been validated for HIPAA. Flag for legal/compliance review before
      recommending to customer.

  - condition: government-cloud
    triggers_on_template_tag: "fedramp-ready"
    blocker: false
    missing: true
    message: >
      Customer is on Government Cloud. This template has not been validated
      for FedRAMP. Confirm compatibility before scoping.

  - condition: no-knowledge-articles
    triggers_on_template_capability: "knowledge-retrieval"
    blocker: false
    message: >
      This template uses Knowledge Article retrieval. Customer does not have
      Knowledge Articles populated. The knowledge-grounded subagent(s) will
      fall back to a degraded response. Recommend article population as a
      pre-launch milestone.

  - condition: no-knowledge-articles
    triggers_on_template_capability: "email-draft"
    blocker: false
    message: >
      Draft response grounding requires Knowledge Articles. Without articles,
      the agent will generate ungrounded responses. Recommend populating at
      least 20–30 articles before go-live.

  - condition: pii-masking-required
    triggers_on_template_capability: "record-summarization"
    blocker: false
    message: >
      Customer requires PII masking. Agentforce does not currently support
      PII masking natively in agent output. Verify current Trust Layer
      capabilities before committing. (Doc 01 — Trust Layer)


# ══════════════════════════════════════════════════════════════════════════════
# TEMPLATES
# Each entry represents one validated (or in-progress) solution template.
# validation_status: validated | in-progress | draft
# ══════════════════════════════════════════════════════════════════════════════

templates:

  - id: staffing-console-agent
    label: "Staffing — Service Console Agent"
    slug: staffing-console-agent
    path: staffing-console-agent/
    validation_status: in-progress   # passes parametrization test; second-customer test pending
    source_org: trailsignup-b840dc69c3ac6b
    extracted: "2026-06-18"
    shaheen_pattern: SOMA             # Operator with Domain SME Workers

    summary: >
      Agentforce Internal Copilot for service console reps handling case volume
      in a staffing industry context. Three subagent capabilities: case summary
      with requestor history, similar resolved case retrieval (customer-type-scoped),
      and AI-drafted email responses grounded on Knowledge Articles (country-scoped).
      Built on Data Cloud retrievers. Declarative-only.

    tags:
      channel:
        - service-console
        - email
      industry:
        - staffing
        - professional-services
      capability:
        - case-summarization
        - case-management
        - knowledge-retrieval
        - knowledge-recommendation
        - similar-case-retrieval
        - email-draft
        - email-response-generation
        - record-summarization
        - sentiment-detection
      data_sources:
        - sf-case
        - sf-contact
        - sf-knowledge
        - sf-custom-object
        - knowledge-articles
        - dc-salesforce-crm
      surface:
        - service-console
      persona:
        - csm
        - service-agent
      org_stack:
        - service-cloud
        - data-cloud
      build_constraints:
        - declarative-only

    requires:
      - data-cloud                    # hard prerequisite — see anti_tags
      - knowledge-articles            # soft prerequisite — degrades without
      - service-cloud
      custom_fields:
        - "[COMPANY]_Case_Country__c"
        - "[COMPANY]_Customer_Type__c"
        - "[COMPANY]_Case_Sensitivity__c"
        - "SDO_Service_Close_Summary__c (verify — may be SDO-specific)"

    anti_tags:
      - condition: no-data-cloud
        blocker: true
        message: >
          Data Cloud is required for both retrievers (Knowledge and Case).
          Without Data Cloud, the Similar Cases and Draft Response subagents
          cannot function as built. Present data-kit.yaml to AE for SKU
          conversation before scoping.
      - condition: no-knowledge-articles
        blocker: false
        message: >
          Draft Response subagent will return a fallback message without
          Knowledge Articles. Recommend pre-populating 20–30 articles covering
          the top case types before go-live. Agent is still deployable.
      - condition: no-custom-fields
        blocker: true
        message: >
          This template requires 3 custom fields on the Case object
          ([COMPANY]_Case_Country__c, [COMPANY]_Customer_Type__c,
          [COMPANY]_Case_Sensitivity__c). These cannot be replaced declaratively.
          If org policy prevents custom field creation, this pattern cannot
          be deployed as built.

    files:
      - README.md
      - agent-definition.md
      - prompt-templates.md
      - flows.md
      - permissions.md
      - data-kit.yaml
      - data-cloud-setup-guide.md

    qualification_signals:
      - "Customer has service reps handling high case volume (email or chat)"
      - "Knowledge Articles exist or are planned (policy docs, procedure guides)"
      - "Customer wants to reduce average handle time on email responses"
      - "Staffing-specific: multi-country or multi-segment case handling (Candidate vs. Client)"

    disqualification_signals:
      - "No Data Cloud on order and not in buying motion"
      - "Customer is purely inbound voice — no email case channel"
      - "No Knowledge Articles and no plan to create them"

    compensation_shape:
      note: "EO subcloud (Agentforce for Service) + FA (Data Cloud). Confirm with AE — do not quote specific rates in customer-facing output."
